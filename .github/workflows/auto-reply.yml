name: 카카오메일 자동 회신

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:         # 수동 테스트용

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 자동 회신 실행
        run: python main.py
        env:
          EMAIL:      ${{ secrets.EMAIL }}
          PASSWORD:   ${{ secrets.PASSWORD }}
          KEYWORD:    ${{ secrets.KEYWORD }}
          REPLY_BODY: ${{ secrets.REPLY_BODY }}
REPLY_SUBJECT: ${{ secrets.REPLY_SUBJECT }}
